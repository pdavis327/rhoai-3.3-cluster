---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hardware-profile
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/pdavis327/openshiftai-helmcharts.git
    targetRevision: main
    path: hardware-profile
    helm:
      releaseName: hardware-profile
      values: |
        # Use lowercase profileName: Kubernetes resource names must be RFC 1123 (lowercase).
        # This creates HardwareProfile named "nvidia-l40s"; reference this name in InferenceService hardwareProfileName.
        profileName: nvidia-l40s
        hardwareProfile:
          identifiers:
            - resourceType: CPU
              identifier: cpu
              displayName: CPU
              minCount: "8"
              maxCount: "16"
              defaultCount: "12"
            - resourceType: Memory
              identifier: memory
              displayName: Memory
              minCount: 32Gi
              maxCount: 64Gi
              defaultCount: 48Gi
            - resourceType: Accelerator
              identifier: nvidia.com/gpu
              displayName: Accelerator
              minCount: 1
              maxCount: 1
              defaultCount: 1
          scheduling:
            node:
              tolerations:
                - key: nvidia.com/gpu
                  operator: Exists
                  effect: NoSchedule
  destination:
    server: https://kubernetes.default.svc
    namespace: redhat-ods-applications
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
