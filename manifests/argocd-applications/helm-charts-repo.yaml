---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: model-registry
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/pdavis327/openshiftai-helmcharts.git
    targetRevision: main
    path: model-registry
    helm:
      releaseName: model-registry
      values: |
        namespace: rhoai-model-registries
        mysql:
          user: 'admin'
          password: 'admin123'
          database: 'coo-registry'
          root_password: 'admin123'
  destination:
    server: https://kubernetes.default.svc
    namespace: rhoai-model-registries
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/pdavis327/openshiftai-helmcharts.git
    targetRevision: main
    path: minio
    helm:
      releaseName: minio
      values: |
        namespace: country-of-origin-predictor
        username: minio
        password: minio123
        storageSize: 100Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: minio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: modeldeploy
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/pdavis327/openshiftai-helmcharts.git
    targetRevision: main
    path: models/modeldeploy
    helm:
      releaseName: model-bge-large-en
      values: |
        modelname: bge-large-embedding-model
        namespace: country-of-origin-predictor
        uri: "oci://quay.io/rh-ee-petdavis/bge-large-en:2"
        runtime: bge-large-embedding-model
        hardwareProfileName: nvidia-l4-small
  destination:
    server: https://kubernetes.default.svc
    namespace: country-of-origin-predictor
  ignoreDifferences:
    # InferenceService: controller injects resources/tolerations and can drop maxReplicas
    - group: serving.kserve.io
      kind: InferenceService
      jsonPointers:
        - /spec/predictor/model/resources
        - /spec/predictor/tolerations
        - /spec/predictor/minReplicas
        - /spec/predictor/maxReplicas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hardware-profile
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/pdavis327/openshiftai-helmcharts.git
    targetRevision: main
    path: hardware-profile
    helm:
      releaseName: hardware-profile
      values: |
        # Use lowercase profileName: Kubernetes resource names must be RFC 1123 (lowercase).
        # This creates HardwareProfile named "nvidia-l40s"; reference this name in InferenceService hardwareProfileName.
        profileName: nvidia-l40s
        hardwareProfile:
          identifiers:
            - resourceType: CPU
              identifier: cpu
              displayName: CPU
              minCount: 8
              maxCount: 16
              defaultCount: 12
            - resourceType: Memory
              identifier: memory
              displayName: Memory
              minCount: 32Gi
              maxCount: 64Gi
              defaultCount: 48Gi
            - resourceType: Accelerator
              identifier: nvidia.com/gpu
              displayName: Accelerator
              minCount: 1
              maxCount: 1
              defaultCount: 1
          scheduling:
            node:
              tolerations:
                - key: nvidia.com/gpu
                  operator: Exists
                  effect: NoSchedule
  destination:
    server: https://kubernetes.default.svc
    namespace: redhat-ods-applications
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hardware-profile-small
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/pdavis327/openshiftai-helmcharts.git
    targetRevision: main
    path: hardware-profile
    helm:
      releaseName: hardware-profile
      values: |
        profileName: nvidia-l4-small
        hardwareProfile:
          identifiers:
            - resourceType: CPU
              identifier: cpu
              displayName: CPU
              minCount: 2
              maxCount: 4
              defaultCount: 3
            - resourceType: Memory
              identifier: memory
              displayName: Memory
              minCount: 6Gi
              maxCount: 12Gi
              defaultCount: 10Gi
            - resourceType: Accelerator
              identifier: nvidia.com/gpu
              displayName: Accelerator
              minCount: 1
              maxCount: 1
              defaultCount: 1
          scheduling:
            node:
              tolerations:
                - key: nvidia.com/gpu
                  operator: Exists
                  effect: NoSchedule
                - key: smallgpu
                  operator: Exists
                  effect: NoSchedule
  destination:
    server: https://kubernetes.default.svc
    namespace: redhat-ods-applications
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
