---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/pdavis327/openshiftai-helmcharts.git
    targetRevision: main
    path: minio
    helm:
      releaseName: minio
      values: |
        namespace: country-of-origin-predictor
        username: minio
        password: minio123
        storageSize: 100Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: minio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
